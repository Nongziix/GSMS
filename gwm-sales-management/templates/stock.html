{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-12 d-flex justify-content-between align-items-center mb-4">
        <h2>{{ title }}</h2>
        <a href="/settings" class="btn btn-gwm btn-sm"><i class="bi bi-arrow-repeat me-1"></i> อัปเดตข้อมูล</a>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover datatable w-100">
                        <thead class="table-dark">
                            <tr>
                                <th>รหัสสินค้า (STKCOD)</th>
                                <th>ชื่อรุ่น/รายละเอียด</th>
                                <th>หมวด</th>
                                <th class="text-end">คงเหลือ</th>
                                <th class="text-center">เครื่องมือ</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for stock in stocks %}
                            <tr>
                                <td class="fw-bold">{{ stock.STKCOD }}</td>
                                <td>{{ stock.STKDES }}</td>
                                <td>{{ stock.STKGRP }}</td>
                                <td class="text-end fw-bold {{ 'text-danger' if stock.QUANO <= 0 else 'text-success' }}">
                                    {{ "{:,.0f}".format(stock.QUANO) }}
                                </td>
                                <td class="text-center">
                                    <a href="{{ url_for('main.stockcard', stkcod=stock.STKCOD) }}" class="btn btn-sm btn-outline-dark">
                                        <i class="bi bi-journal-text me-1"></i> Stock Card
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
